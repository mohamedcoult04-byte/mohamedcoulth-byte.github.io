<script type="module">
    // ... (Ton import Firebase et config)

    // Définition du calendrier des missions
    // Jour 2 (Mardi) : Missions 1 & 2
    // Jour 3 (Mercredi) : Mission 3
    // Jour 4 (Jeudi) : Mission 4 ...
    const MISSION_SCHEDULE = {
        1: 2, // Mission 1 débloquée le Mardi (Day 2)
        2: 2, // Mission 2 débloquée le Mardi (Day 2)
        3: 3, // Mission 3 débloquée le Mercredi (Day 3)
        4: 4, // Mission 4 débloquée le Jeudi (Day 4)
        5: 5, // Mission 5 débloquée le Vendredi (Day 5)
        6: 6  // Mission 6 débloquée le Samedi (Day 6)
    };

    function canAccessMission(missionId) {
        const now = new Date();
        const currentDay = now.getDay(); // 0=Dim, 1=Lun, 2=Mar, 3=Mer, 4=Jeu, 5=Ven, 6=Sam
        
        // Si on est Dimanche (0) ou Lundi (1), aucune mission n'est accessible
        if (currentDay < 2) return false;

        const requiredDay = MISSION_SCHEDULE[missionId];
        return currentDay >= requiredDay;
    }

    window.initGame = () => {
        const saved = localStorage.getItem('quest_data');
        if(saved) {
            userData = JSON.parse(saved);
            document.getElementById('pts-val').innerText = userData.points;
            if(userData.theme) document.body.className = userData.theme;
        }

        showMission(userData.currentMission);
    };

    function showMission(id) {
        // Cache tout par défaut
        document.querySelectorAll('.card[id^="mission-"]').forEach(c => c.classList.add('hidden'));
        document.getElementById('wait-screen').classList.add('hidden');
        document.getElementById('success-card').classList.add('hidden');

        // Vérification de l'accès selon le jour
        if (!canAccessMission(id)) {
            document.getElementById('wait-screen').classList.remove('hidden');
            // Personnalisation du message d'attente
            const nextDay = MISSION_SCHEDULE[id];
            const days = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];
            document.querySelector('#wait-screen p').innerHTML = `La prochaine mission sera disponible le <b>${days[nextDay]}</b>.`;
            return;
        }

        // Si accès autorisé, on affiche la mission actuelle
        const m = document.getElementById(`mission-${id}`);
        if(m) m.classList.remove('hidden');
    }

    // Modifie aussi ta fonction nextMission pour vérifier le jour après une victoire
    window.nextMission = () => {
        showMission(userData.currentMission);
    };

    // ... (Le reste de tes fonctions validateEnigma, etc.)
</script>
