<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Quest - INPHB</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #10b981; }
        .theme-ocean { --bg: #0c4a6e; --card: #0ea5e9; --primary: #075985; }
        .theme-forest { --bg: #064e3b; --card: #10b981; --primary: #065f46; }
        .theme-volcano { --bg: #450a0a; --card: #ef4444; --primary: #991b1b; }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.5s; overflow: hidden; display: flex; }
        #sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #1e293b; z-index: 100; padding: 20px; box-shadow: 10px 0 15px rgba(0,0,0,0.3); border-right: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 90; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); display: flex; flex-direction: column; height: 100vh; }
        .top-bar { padding: 15px; display: flex; justify-content: flex-end; align-items: center; background: rgba(0,0,0,0.2); }
        .btn-menu { display: none; } 
        .points-display { background: #d4a017; color: black; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .view { padding: 20px; flex: 1; overflow-y: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .enigma-container { max-width: 450px; margin: 0 auto; text-align: center; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; }
        input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px; color: white; margin-top: 10px; box-sizing: border-box; }
        .enigma-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .enigma-grid img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; align-items: center; justify-content: center; padding: 20px; }

        @media (max-width: 768px) {
            #sidebar { left: -260px; transition: 0.3s; }
            #sidebar.open { left: 0; }
            .main-content { margin-left: 0; width: 100%; }
            .btn-menu { display: block; background:none; border:none; color:white; font-size:24px; position: absolute; left: 15px; top: 15px; width: auto; margin:0; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="card enigma-container" style="border: 1px solid var(--primary);">
            <h2 id="auth-title">Connexion</h2>
            <div id="register-fields" class="hidden">
                <input type="text" id="reg-nom" placeholder="Nom">
                <input type="text" id="reg-prenom" placeholder="Prénom">
            </div>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Mot de passe">
            <button onclick="handleAuth()" id="auth-btn">Se connecter</button>
            <p id="auth-toggle" style="cursor:pointer; margin-top:15px; font-size:0.9em; color:var(--primary);" onclick="toggleAuthMode()">Pas de compte ? S'inscrire</p>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar">
        <h2 style="margin-top:0">⚙️ Menu</h2>
        <button onclick="showView('view-game')">🏠 Mission Actuelle</button>
        <button onclick="showView('view-team')">👥 Espace Équipe</button>
        <button onclick="showView('view-shop')">🛒 Boutique</button>
        <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
        <button style="background: #ef4444;" onclick="logout()">Déconnexion</button>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <button class="btn-menu" onclick="toggleMenu()">☰</button>
            <div class="points-display">🪙 <span id="pts-val">0</span></div>
        </div>

        <div id="view-game" class="view">
            <div id="mission-1" class="card enigma-container hidden">
                <h2 style="margin-top:0">Mission 1</h2>
                <div class="enigma-grid">
                    <img src="https://media.istockphoto.com/id/1270392109/fr/photo/ferme-de-poulet-%C3%A0-lint%C3%A9rieur-alimentation-de-poulet-ferme-pour-la-culture-des-poulets-de.jpg?s=612x612&w=0&k=20&c=BQ0YaFIGO2OGjx73j7e5dzowck4bIEAD20rnJsOodNg=">
                    <img src="https://media.gettyimages.com/id/1138138146/fr/photo/vue-arri%C3%A8re-dun-grand-groupe-d%C3%A9tudiants-sur-une-classe-%C3%A0-la-salle-de-conf%C3%A9rence.jpg?s=612x612&w=gi&k=20&c=juaaQAIsbTBVHxfadM2ccLaXb9JfuS7ynbxT7NuMAYg=">
                    <img src="https://media-files.abidjan.net/photo/INPHB%20(59).JPG">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSnfuuvlorW_NyhjQnyvBpBGTSZPpB5bNOLdw&s">
                </div>
                <input type="text" id="enigma-input" placeholder="Réponse...">
                <button onclick="validateEnigma()">Valider la Mission</button>
            </div>

            <div id="mission-2" class="card enigma-container hidden">
                <h2 style="margin-top:0">Mission 2</h2>
                <p>"Des piliers vivants montent vers le ciel..."</p>
                <button onclick="checkLocationM2()">📍 Je suis sur place !</button>
            </div>

            <div id="success-card" class="card hidden enigma-container">
                <h2 style="color: var(--accent); margin-top:0;">🏆 Réussi !</h2>
                <p id="success-text">Félicitations ! Vous avez remporté <b>20 points</b>.</p>
                <button onclick="nextMission()">Suivant</button>
            </div>
        </div>

        <div id="view-shop" class="view hidden">
            <div class="card enigma-container">
                <h3>🛒 Boutique</h3>
                <button onclick="buyTheme('theme-ocean', 70)">Océan (70 pts)</button>
                <button onclick="buyTheme('theme-forest', 30)">Forêt (30 pts)</button>
                <button onclick="buyTheme('theme-volcano', 50)">Volcan (50 pts)</button>
            </div>
        </div>

        <div id="view-team" class="view hidden">
            <div class="card enigma-container">
                <h3>👥 Équipe</h3>
                <div id="team-setup"><button onclick="handleCreateTeam()">✨ Créer une équipe (-20 pts)</button></div>
                <div id="team-ui" class="hidden"><h3 id="ui-team-name"></h3><p>Canal d'équipe activé.</p></div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAG58GX0IqcLtSbvLrwtpZuQEkjbqB_8Rg",
            authDomain: "chasse-tr.firebaseapp.com",
            projectId: "chasse-tr",
            storageBucket: "chasse-tr.firebasestorage.app",
            messagingSenderId: "117152227652",
            appId: "1:117152227652:web:cfe2d821f648d3ec553711"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let userData = { points: 100, currentMission: 1, theme: '', teamName: '' };
        let isLoginMode = true;

        const config = {
            m2: { lat: 6.886091, lon: -5.228207, radius: 50 },
            m3: { lat: 6.880864, lon: -5.231936, radius: 50 },
            m4: { lat: 6.872288, lon: -5.233245, radius: 50 },
            m5: { lat: 6.822345, lon: -5.244321, radius: 50 }
        };

        // --- AUTHENTIFICATION ---
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Connexion" : "Inscription";
            document.getElementById('register-fields').classList.toggle('hidden', isLoginMode);
            document.getElementById('auth-btn').innerText = isLoginMode ? "Se connecter" : "Créer mon compte";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            try {
                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    const nom = document.getElementById('reg-nom').value;
                    const prenom = document.getElementById('reg-prenom').value;
                    const res = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(res.user.uid).set({
                        nom, prenom, points: 100, currentMission: 1, theme: '', teamName: ''
                    });
                }
            } catch (e) { alert(e.message); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // --- SYNCHRONISATION ---
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                db.collection('users').doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        userData = doc.data();
                        updateUI();
                        document.getElementById('auth-screen').classList.add('hidden');
                    }
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        function updateUI() {
            document.getElementById('pts-val').innerText = userData.points;
            if(userData.theme) document.body.className = userData.theme;
            if(userData.teamName) {
                document.getElementById('team-setup').classList.add('hidden');
                document.getElementById('team-ui').classList.remove('hidden');
                document.getElementById('ui-team-name').innerText = "🛡️ " + userData.teamName;
            }
            document.querySelectorAll('.view > .card').forEach(c => {
                if(c.id.startsWith('mission-')) c.classList.add('hidden');
            });
            let currentId = userData.currentMission === 8 ? 'mission-8b' : `mission-${userData.currentMission}`;
            if(document.getElementById(currentId)) document.getElementById(currentId).classList.remove('hidden');
        }

        async function saveGame() {
            if (auth.currentUser) {
                await db.collection('users').doc(auth.currentUser.uid).update(userData);
            }
        }

        // --- LOGIQUE JEU ---
        function validateEnigma() {
            const input = document.getElementById('enigma-input').value.trim().toUpperCase();
            if(["INP-NORD", "INP NORD"].includes(input)) {
                completeMission();
            } else alert("Mauvaise réponse !");
        }

        function checkLocationM2() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, config.m2.lat, config.m2.lon);
                if(dist <= config.m2.radius) completeMission();
                else alert(`Encore ${Math.round(dist)}m !`);
            });
        }

        function completeMission() {
            userData.points += 20;
            document.getElementById('success-card').classList.remove('hidden');
            // On cache la mission actuelle
            let currentId = userData.currentMission === 8 ? 'mission-8b' : `mission-${userData.currentMission}`;
            document.getElementById(currentId).classList.add('hidden');
        }

        function nextMission() {
            userData.currentMission++;
            document.getElementById('success-card').classList.add('hidden');
            saveGame();
        }

        // --- UTILS ---
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(window.innerWidth <= 768) toggleMenu();
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function buyTheme(id, price) {
            if(userData.points >= price) {
                userData.points -= price;
                userData.theme = id;
                saveGame();
            } else alert("Pas assez de points !");
        }

        function handleCreateTeam() {
            if(userData.points < 20) return alert("Besoin de 20 pts !");
            let n = prompt("Nom de l'équipe ?");
            if(n) {
                userData.points -= 20;
                userData.teamName = n;
                saveGame();
            }
        }
    </script>
</body>
</html>
