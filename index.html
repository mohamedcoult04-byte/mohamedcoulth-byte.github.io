<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Quest - INPHB</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #1e293b; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow-y: auto; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin: 0 auto 20px; max-width: 500px; text-align: center; }
        .hidden { display: none !important; }
        input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px; color: white; margin-top: 10px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .enigma-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .enigma-grid img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .points-display { position: absolute; top: 20px; right: 20px; background: #d4a017; color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="card">
            <h2>⚔️ Connexion</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pwd" placeholder="Mot de passe">
            <button onclick="handleAuth()">Accéder au campus</button>
        </div>
    </div>

    <div id="sidebar">
        <h2 style="color: var(--primary)">⚙️ Menu</h2>
        <p id="user-display" style="font-size: 0.8em; color: var(--accent);">...</p>
        <button onclick="showMission(userData.mission)">🏠 Mission Actuelle</button>
        <button style="background: #ef4444; margin-top: auto;" onclick="resetProgress()">🔄 Réinitialiser</button>
    </div>

    <div class="main-content">
        <div class="points-display">🪙 <span id="pts-val">100</span></div>

        <div id="wait-screen" class="card hidden">
            <h2 style="color: #6366f1;">⏳ Zone Verrouillée</h2>
            <p id="wait-msg"></p>
        </div>

        <div id="mission-1" class="card hidden">
            <h2>Mission 1</h2>
            <div class="enigma-grid">
                <img src="https://media.istockphoto.com/id/1270392109/fr/photo/ferme-de-poulet.jpg?s=612x612&w=0&k=20&c=BQ0YaFIGO2OGjx73j7e5dzowck4bIEAD20rnJsOodNg=">
                <img src="https://media.gettyimages.com/id/1138138146/fr/photo/etudiants-classe.jpg?s=612x612&w=gi&k=20&c=juaaQAIsbVHxfadM2ccLaXb9JfuS7ynbxT7NuMAYg=">
                <img src="https://media-files.abidjan.net/photo/INPHB%20(59).JPG">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSnfuuvlorW_NyhjQnyvBpBGTSZPpB5bNOLdw&s">
            </div>
            <input type="text" id="ans-1" placeholder="Ta réponse...">
            <button onclick="checkM1()">Valider la Mission</button>
        </div>

        <div id="success-card" class="card hidden">
            <h2 style="color: var(--accent)">🏆 Mission Réussie !</h2>
            <p>Ton score a été mis à jour.</p>
            <button onclick="location.reload()">Mission Suivante</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBViCG7R5figWOjx1cZAiwb7c_zlq2Stps",
            authDomain: "treasure-hunt-6c11e.firebaseapp.com",
            projectId: "treasure-hunt-6c11e",
            storageBucket: "treasure-hunt-6c11e.firebasestorage.app",
            messagingSenderId: "692216287728",
            appId: "1:692216287728:web:70759777dbaef6e2998d35"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.userData = { points: 100, mission: 1 };

        // --- CALENDRIER ---
        // Mission 1 & 2 : Dispo maintenant
        // Mission 3 : Jeudi (4)
        // Mission 4 : Vendredi (5)
        const SCHEDULE = { 1: 0, 2: 0, 3: 4, 4: 5, 5: 6 }; 

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('user-display').innerText = user.email;
                const saved = localStorage.getItem('quest_save');
                if(saved) window.userData = JSON.parse(saved);
                document.getElementById('pts-val').innerText = window.userData.points;
                showMission(window.userData.mission);
            }
        });

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pwd = document.getElementById('auth-pwd').value;
            try { await signInWithEmailAndPassword(auth, email, pwd); } 
            catch { await createUserWithEmailAndPassword(auth, email, pwd).catch(e => alert(e.message)); }
        };

        window.showMission = (id) => {
            document.querySelectorAll('.card[id^="mission-"], #wait-screen').forEach(c => c.classList.add('hidden'));
            const today = new Date().getDay(); 
            const required = SCHEDULE[id] || 0;

            if(today < required && required !== 0) {
                const days = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];
                document.getElementById('wait-screen').classList.remove('hidden');
                document.getElementById('wait-msg').innerText = `Cette mission se débloque le ${days[required]} à 00h00.`;
            } else {
                const m = document.getElementById(`mission-${id}`);
                if(m) m.classList.remove('hidden');
                else console.log("Mission " + id + " non définie dans le HTML");
            }
        };

        window.checkM1 = () => {
            if(document.getElementById('ans-1').value.toUpperCase().includes("INP NORD")) {
                window.userData.points += 20;
                window.userData.mission = 2; // Passe à la mission suivante
                localStorage.setItem('quest_save', JSON.stringify(window.userData));
                document.getElementById('mission-1').classList.add('hidden');
                document.getElementById('success-card').classList.remove('hidden');
            } else { alert("Réponse incorrecte !"); }
        };

        window.resetProgress = () => {
            if(confirm("Réinitialiser le jeu ?")) {
                localStorage.removeItem('quest_save');
                location.reload();
            }
        };
    </script>
</body>
</html>
